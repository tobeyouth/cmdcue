- id: tmux.pane.break-out
  tool: tmux
  category: layout
  title: Break pane into a new window
  i18n:
    zh:
      title: 将当前 pane 分离成独立 window
  intent:
    verbs:
      - break
      - split
      - detach
      - 分离
      - 拆出
    objects:
      - pane
      - 分屏
      - window
      - 窗口
    queries:
      - tmux break pane
      - tmux pane to window
      - tmux 分离 pane
      - 将 pane 拆成 window
  shortcuts:
    - keys: prefix + !
      description: Break the current pane into a new window
      i18n:
        zh:
          description: 将当前 pane 拆分为独立的 window
  commands:
    - command: tmux break-pane
      preferredCommand: tmux breakp
      description: Break the active pane into a separate window
      i18n:
        zh:
          description: 将当前 pane 分离成一个新的 window
      pasteable: true
      risk: safe
- id: tmux.pane.join
  tool: tmux
  category: layout
  title: Join pane into a window
  i18n:
    zh:
      title: 将 pane 合并到另一个 window
  intent:
    verbs:
      - join
      - merge
      - combine
      - 合并
      - 加入
    objects:
      - pane
      - 分屏
      - window
      - 窗口
    queries:
      - tmux join pane
      - tmux merge pane
      - tmux pane 合并到 window
      - 将 pane 合并到 window
  shortcuts: []
  commands:
    - command: tmux join-pane -s <src-pane> -t <dst-window>
      description: Move the source pane into the target window as a new pane
      i18n:
        zh:
          description: 将源 pane 移动到目标 window 中作为一个新 pane
      pasteable: true
      risk: safe
    - command: tmux join-pane -t <dst-pane>
      description: Move the current pane into the target window
      i18n:
        zh:
          description: 将当前 pane 移动到目标 window 中
      pasteable: true
      risk: safe
  notes:
    - Use -h for horizontal split and -v for vertical split when joining.
- id: tmux.window.link
  tool: tmux
  category: layout
  title: Link window to another session
  i18n:
    zh:
      title: 将 window 链接到另一个 session
  intent:
    verbs:
      - link
      - attach
      - move
      - 链接
      - 移动
    objects:
      - window
      - 窗口
      - session
      - 会话
    queries:
      - tmux link window
      - tmux window to session
      - tmux 链接 window
  shortcuts: []
  commands:
    - command: tmux link-window -s <src-window> -t <dst-session>
      description: Link the source window into the target session
      i18n:
        zh:
          description: 将源 window 链接到目标 session
      pasteable: true
      risk: safe
    - command: tmux link-window -k -s <src-window> -t <dst-session>
      description: Link window and kill the source if it becomes empty
      i18n:
        zh:
          description: 链接 window，若源 window 变空则删除它
      pasteable: true
      risk: safe
- id: tmux.window.unlink
  tool: tmux
  category: layout
  title: Unlink window from session
  i18n:
    zh:
      title: 将 window 从 session 解除链接
  intent:
    verbs:
      - unlink
      - detach
      - remove
      - 解除链接
      - 移除
    objects:
      - window
      - 窗口
      - session
      - 会话
    queries:
      - tmux unlink window
      - tmux 解除链接 window
  shortcuts: []
  commands:
    - command: tmux unlink-window
      description: Unlink the current window from its session
      i18n:
        zh:
          description: 将当前 window 从其所属 session 解除链接
      pasteable: true
      risk: safe
    - command: tmux unlink-window -k
      description: Unlink and kill the window if it becomes empty
      i18n:
        zh:
          description: 解除链接，若 window 变空则删除它
      pasteable: true
      risk: safe
