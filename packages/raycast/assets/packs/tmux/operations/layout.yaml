- id: tmux.layout.select
  tool: tmux
  category: layout
  title: Select a layout preset
  i18n:
    zh:
      title: 切换 tmux 布局
  intent:
    verbs:
      - select
      - switch
      - 切换
      - 选择
    objects:
      - layout
      - 布局
    queries:
      - tmux select layout
      - tmux 切换布局
      - tmux 布局
  shortcuts:
    - keys: prefix + M-1
      description: Select the even-horizontal layout
      i18n:
        zh:
          description: 选择 even-horizontal 布局（左右平铺）
    - keys: prefix + M-2
      description: Select the even-vertical layout
      i18n:
        zh:
          description: 选择 even-vertical 布局（上下平铺）
    - keys: prefix + M-3
      description: Select the main-horizontal layout
      i18n:
        zh:
          description: 选择 main-horizontal 布局（主 pane 在上）
    - keys: prefix + M-4
      description: Select the main-vertical layout
      i18n:
        zh:
          description: 选择 main-vertical 布局（主 pane 在左）
    - keys: prefix + M-5
      description: Select the tiled layout
      i18n:
        zh:
          description: 选择 tiled 布局（平铺）
  commands:
    - command: tmux select-layout -t <pane-id> <layout-name>
      preferredCommand: tmux selectl <layout-name>
      description: Apply a named layout preset to the current window
      i18n:
        zh:
          description: 为当前 window 应用指定的布局预设
      pasteable: true
      risk: safe
  notes:
    - "Available layouts: even-horizontal, even-vertical, main-horizontal, main-vertical, tiled, browser, horizontal, vertical."
- id: tmux.layout.next
  tool: tmux
  category: layout
  title: Cycle to next layout
  i18n:
    zh:
      title: 切换到下一个 tmux 布局
  intent:
    verbs:
      - next
      - cycle
      - 下一个
      - 循环
    objects:
      - layout
      - 布局
    queries:
      - tmux next layout
      - tmux 下一个布局
  shortcuts:
    - keys: prefix + Space
      description: Cycle to the next layout
      i18n:
        zh:
          description: 循环切换到下一个布局
  commands:
    - command: tmux next-layout
      preferredCommand: tmux nextl
      description: Switch to the next layout in the current window
      i18n:
        zh:
          description: 切换到当前 window 的下一个布局
      pasteable: true
      risk: safe
