- id: tmux.layout.rotate
  tool: tmux
  category: layout
  title: Rotate window panes
  i18n:
    zh:
      title: 旋转 tmux window 中的 panes
  intent:
    verbs:
      - rotate
      - swap
      - 旋转
      - 交换
    objects:
      - pane
      - panes
      - window
      - 分屏
      - 窗口
    queries:
      - tmux rotate window
      - tmux rotate panes
      - tmux 旋转 panes
  shortcuts:
    - keys: prefix + M-o
      description: Rotate panes in the current window clockwise
      i18n:
        zh:
          description: 顺时针旋转当前 window 中的 panes
  commands:
    - command: tmux rotate-window
      preferredCommand: tmux rotatew
      description: Rotate panes in the current window
      i18n:
        zh:
          description: 旋转当前 window 中的 panes
      pasteable: true
      risk: safe
    - command: tmux rotate-window -D
      description: Rotate panes counter-clockwise
      i18n:
        zh:
          description: 逆时针旋转 panes
      pasteable: true
      risk: safe
- id: tmux.window.swap
  tool: tmux
  category: layout
  title: Swap windows
  i18n:
    zh:
      title: 交换两个 tmux window 的位置
  intent:
    verbs:
      - swap
      - exchange
      - move
      - 交换
      - 调换
    objects:
      - window
      - windows
      - 窗口
    queries:
      - tmux swap window
      - tmux 交换 window
      - 调换 tmux window 位置
  shortcuts: []
  commands:
    - command: tmux swap-window -s <src-window> -t <dst-window>
      description: Swap src-window with dst-window
      i18n:
        zh:
          description: 将源 window 与目标 window 交换位置
      pasteable: true
      risk: safe
    - command: tmux swap-window -t <window-index>
      description: Swap the current window with the target window index
      i18n:
        zh:
          description: 将当前 window 与指定编号的 window 交换位置
      pasteable: true
      risk: safe
    - command: tmux swap-window -d -t <window-index>
      description: Swap the current window with the target and keep it at destination
      i18n:
        zh:
          description: 交换后保持目标 window 在当前位置
      pasteable: true
      risk: safe
