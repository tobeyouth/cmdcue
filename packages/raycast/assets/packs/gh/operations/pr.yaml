- id: gh.pr.checkout
  tool: gh
  category: pr
  title: Check out a pull request locally
  i18n:
    zh:
      title: 检出 Pull Request 到本地
  intent:
    verbs:
      - checkout
      - switch
      - fetch
      - 检出
      - 切换
    objects:
      - pull request
      - pr
      - branch
      - PR
    queries:
      - gh pr checkout
      - checkout pull request
      - 检出 PR
      - gh pr 检出
  shortcuts: []
  commands:
    - command: gh pr checkout <pr-number>
      description: Check out PR <pr-number> as a local branch
      i18n:
        zh:
          description: 将 PR <pr-number> 检出为本地分支
      pasteable: true
      risk: safe
    - command: gh pr checkout
      description: Check out the PR for the current branch
      i18n:
        zh:
          description: 检出当前分支关联的 PR
      pasteable: true
      risk: safe
  notes:
    - The PR branch will be checked out with the PR number as the branch name

- id: gh.pr.merge
  tool: gh
  category: pr
  title: Merge a pull request
  i18n:
    zh:
      title: 合并 Pull Request
  intent:
    verbs:
      - merge
      - combine
      - merge
      - 合并
    objects:
      - pull request
      - pr
      - PR
    queries:
      - gh pr merge
      - merge pull request
      - 合并 PR
      - gh pr 合并
  shortcuts: []
  commands:
    - command: gh pr merge <pr-number>
      description: Merge PR <pr-number>
      i18n:
        zh:
          description: 合并 PR <pr-number>
      pasteable: true
      risk: destructive
    - command: gh pr merge --squash
      description: Squash and merge the PR
      i18n:
        zh:
          description: Squash 后合并 PR
      pasteable: true
      risk: destructive
    - command: gh pr merge --rebase
      description: Rebase and merge the PR
      i18n:
        zh:
          description: Rebase 后合并 PR
      pasteable: true
      risk: destructive
    - command: gh pr merge --delete-branch
      description: Delete the branch after merging
      i18n:
        zh:
          description: 合并后删除分支
      pasteable: true
      risk: destructive
    - command: gh pr merge --auto
      description: Merge only if all checks pass (auto-merge)
      i18n:
        zh:
          description: 所有检查通过后自动合并（需要先设置好保护规则）
      pasteable: true
      risk: destructive
    - command: gh pr merge --admin
      description: Merge with admin privileges (skip restrictions)
      i18n:
        zh:
          description: 用管理员权限合并（跳过限制）
      pasteable: true
      risk: destructive
  notes:
    - Default merge strategy is squash merge
    - Use --disable-merge to disable auto-merge for a PR

