# =============================================================================
# GH PR — Pull Request operations
# https://cli.github.com/manual/gh_pr
# =============================================================================

- id: gh.pr.create
  tool: gh
  category: pr
  title: Create a pull request
  i18n:
    zh:
      title: 创建 Pull Request
  intent:
    verbs:
      - create
      - new
      - make
      - 创建
      - 新建
    objects:
      - pull request
      - pr
      - PR
    queries:
      - gh pr create
      - create pull request
      - 新建 PR
      - 创建 pull request
      - gh pr new
  shortcuts: []
  commands:
    - command: gh pr create --title "<title>" --body "<body>"
      description: Create PR with specified title and body
      i18n:
        zh:
          description: 指定标题和正文创建 PR
      pasteable: true
      risk: safe
    - command: gh pr create
      description: Interactively create a PR (title, body, reviewers, labels)
      i18n:
        zh:
          description: 交互式创建 PR（标题、正文、审核人、标签）
      pasteable: true
      risk: safe
    - command: gh pr create --fill
      description: Auto-fill title and body from commit messages
      i18n:
        zh:
          description: 用提交信息自动填充标题和正文
      pasteable: true
      risk: safe
    - command: gh pr create --fill-first
      description: Use first commit message for title and body
      i18n:
        zh:
          description: 使用第一个提交信息作为标题和正文
      pasteable: true
      risk: safe
    - command: gh pr create --draft
      description: Create as a draft pull request
      i18n:
        zh:
          description: 创建为草稿 PR
      pasteable: true
      risk: safe
    - command: gh pr create --base <base-branch>
      description: Specify the target branch to merge into (-B/--base)
      i18n:
        zh:
          description: 指定目标分支（-B/--base）
      pasteable: true
      risk: safe
    - command: gh pr create --head <head-branch>
      description: Specify the source branch that contains the PR commits (-H/--head)
      i18n:
        zh:
          description: 指定包含 PR 提交的源分支（-H/--head）
      pasteable: true
      risk: safe
    - command: gh pr create --reviewer <user-or-team>
      description: Request reviews from specific users or teams
      i18n:
        zh:
          description: 指定审核人或团队
      pasteable: true
      risk: safe
    - command: gh pr create --label <label> --label <label>
      description: Add labels to the PR
      i18n:
        zh:
          description: 为 PR 添加标签
      pasteable: true
      risk: safe
    - command: gh pr create --assignee @me
      description: Assign the PR to yourself
      i18n:
        zh:
          description: 将 PR 分配给自己
      pasteable: true
      risk: safe
    - command: gh pr create --project "<project-title>"
      description: Add PR to a GitHub project
      i18n:
        zh:
          description: 将 PR 添加到 GitHub 项目
      pasteable: true
      risk: safe
    - command: gh pr create --web
      description: Open the web browser to create a PR
      i18n:
        zh:
          description: 在浏览器中打开创建 PR 页面
      pasteable: true
      risk: safe
    - command: gh pr create --dry-run
      description: Print PR details without actually creating it
      i18n:
        zh:
          description: 仅打印 PR 详情，不实际创建
      pasteable: true
      risk: safe
    - command: gh pr create --editor
      description: Open text editor to write title and body
      i18n:
        zh:
          description: 打开文本编辑器编写标题和正文
      pasteable: true
      risk: safe
  notes:
    - If the current branch isn't pushed, gh will prompt to push or fork
    - Use --head user:branch to specify a head repo (useful for forks)
    - Link issues with "Fixes #123" or "Closes #123" in the PR body
    - Adding projects requires project scope — run gh auth refresh -s <scope>

- id: gh.pr.list
  tool: gh
  category: pr
  title: List pull requests
  i18n:
    zh:
      title: 列出 Pull Requests
  intent:
    verbs:
      - list
      - show
      - view
      - browse
      - 列出
      - 查看
    objects:
      - pull request
      - pr
      - pull requests
      - PR
    queries:
      - gh pr list
      - list pull requests
      - 查看 PR 列表
      - gh pr 列表
  shortcuts: []
  commands:
    - command: gh pr list
      description: List open pull requests in the current repo
      i18n:
        zh:
          description: 列出当前仓库的开放 PR
      pasteable: true
      risk: safe
    - command: gh pr list --state closed
      description: List closed pull requests
      i18n:
        zh:
          description: 列出已关闭的 PR
      pasteable: true
      risk: safe
    - command: gh pr list --state merged
      description: List merged pull requests
      i18n:
        zh:
          description: 列出已合并的 PR
      pasteable: true
      risk: safe
    - command: gh pr list --base <base-branch>
      description: List PRs targeting a specific branch
      i18n:
        zh:
          description: 列出指向特定分支的 PR
      pasteable: true
      risk: safe
    - command: gh pr list --author <user>
      description: List PRs created by a specific user
      i18n:
        zh:
          description: 列出特定用户创建的 PR
      pasteable: true
      risk: safe
    - command: gh pr list --assignee @me
      description: List PRs assigned to you
      i18n:
        zh:
          description: 列出分配给你的 PR
      pasteable: true
      risk: safe
    - command: gh pr list --label <label> --label <label>
      description: Filter PRs by labels
      i18n:
        zh:
          description: 按标签筛选 PR
      pasteable: true
      risk: safe
    - command: gh pr list --search "<query>"
      description: Search PRs by keyword
      i18n:
        zh:
          description: 按关键词搜索 PR
      pasteable: true
      risk: safe
    - command: gh pr list --json <fields>
      description: Output PR list as JSON
      i18n:
        zh:
          description: 以 JSON 格式输出 PR 列表
      pasteable: true
      risk: safe
  notes:
    - Use --limit N to control how many PRs are returned (default 20)

