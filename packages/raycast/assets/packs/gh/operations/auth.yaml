  intent:
    verbs:
      - switch
      - change
      - account
      - 切换
      - 账号
    objects:
      - account
      - user
      - 账号
      - 用户
    queries:
      - gh auth switch
      - switch github account
      - gh 切换账号
  shortcuts: []
  commands:
    - command: gh auth switch
      description: Interactively switch between stored accounts
      i18n:
        zh:
          description: 交互式切换已存储的账号
      pasteable: true
      risk: safe
    - command: gh auth switch --hostname <hostname>
