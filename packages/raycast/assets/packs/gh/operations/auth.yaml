- id: gh.auth.refresh
  tool: gh
  category: auth
  title: Refresh authentication scopes
  i18n:
    zh:
      title: 刷新认证权限范围
  intent:
    verbs:
      - refresh
      - re-authenticate
      - scopes
      - 刷新
      - 重新认证
    objects:
      - auth
      - token
      - scope
      - 权限
    queries:
      - gh auth refresh
      - refresh github token scopes
      - gh 刷新 token
  shortcuts: []
  commands:
    - command: gh auth refresh
      description: Refresh authentication token with current scopes
      i18n:
        zh:
          description: 刷新当前权限范围的认证 token
      pasteable: true
      risk: safe
    - command: gh auth refresh -s <scope>
      description: Add project scope to current authentication
      i18n:
        zh:
          description: 为当前认证添加 project 权限
      pasteable: true
      risk: safe
  notes:
    - Required when adding new features like project management

- id: gh.auth.switch
