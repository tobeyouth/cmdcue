- id: gh.auth.token
  tool: gh
  category: auth
  title: Print authentication token
  i18n:
    zh:
      title: 打印认证 Token
  intent:
    verbs:
      - token
      - show
      - print
      - view
      - 查看
      - 显示
    objects:
      - token
      - auth
      - token
    queries:
      - gh auth token
      - print github token
      - gh 查看 token
  shortcuts: []
  commands:
    - command: gh auth token
      description: Print the authentication token to stdout
      i18n:
        zh:
          description: 将认证 token 打印到标准输出
      pasteable: true
      risk: destructive
  notes:
    - Token is printed to stdout — be careful in shared environments
    - Requires repo scope to see tokens for GitHub.com

