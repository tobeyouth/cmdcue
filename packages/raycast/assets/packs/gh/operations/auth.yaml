# =============================================================================
# GH AUTH — Authentication operations
# https://cli.github.com/manual/gh_auth
# =============================================================================

- id: gh.auth.login
  tool: gh
  category: auth
  title: Log in to GitHub
  i18n:
    zh:
      title: 登录 GitHub
  intent:
    verbs:
      - login
      - signin
      - authenticate
      - 登录
      - 认证
    objects:
      - github
      - account
      - GitHub
    queries:
      - gh login
      - github cli login
      - 登录 github
      - gh 登录
      - github 认证
  shortcuts: []
  commands:
    - command: gh auth login
      description: Start interactive login flow
      i18n:
        zh:
          description: 开始交互式登录流程
      pasteable: true
      risk: safe
    - command: gh auth login --web
      description: Open browser to authenticate
      i18n:
        zh:
          description: 打开浏览器进行身份验证
      pasteable: true
      risk: safe
    - command: gh auth login --web --clipboard
      description: Open browser and copy one-time code to clipboard
      i18n:
        zh:
          description: 打开浏览器并复制一次性验证码到剪贴板
      pasteable: true
      risk: safe
    - command: gh auth login --with-token
      description: Read token from standard input
      i18n:
        zh:
          description: 从标准输入读取 token
      pasteable: true
      risk: safe
    - command: gh auth login --hostname <hostname>
      description: Authenticate against a specific GitHub Enterprise host
      i18n:
        zh:
          description: 登录指定的 GitHub Enterprise 实例
      pasteable: true
      risk: safe
  notes:
    - "Minimum required scopes for a classic token: repo, read:org, gist"
    - Use --git-protocol {ssh|https} to set the git protocol during login
    - Use --skip-ssh-key to skip SSH key generation/upload prompt

- id: gh.auth.status
  tool: gh
  category: auth
  title: Check authentication status
  i18n:
    zh:
      title: 查看登录状态
  intent:
    verbs:
      - status
      - check
      - whoami
      - 查看
      - 状态
    objects:
      - auth
      - login
      - account
      - 登录状态
      - 认证状态
    queries:
      - gh auth status
      - github cli logged in
      - gh 登录状态
      - github 已登录
  shortcuts: []
  commands:
    - command: gh auth status
      description: Show current authentication status
      i18n:
        zh:
          description: 显示当前登录状态
      pasteable: true
      risk: safe
    - command: gh auth status --hostname <hostname>
      description: Check status for a specific host
      i18n:
        zh:
          description: 查看指定主机的登录状态
      pasteable: true
      risk: safe
  notes:
    - Shows which account is logged in and stored credential location

