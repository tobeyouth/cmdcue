- id: tmux.copy-mode.enter
  tool: tmux
  category: copy-mode
  title: Enter copy mode
  zh: 进入 tmux copy mode
  intent:
    verbs:
      - copy
      - scroll
      - history
      - enter
      - 进入
      - 滚动
      - 复制
    objects:
      - copy-mode
      - history
      - scrollback
      - 历史
      - 回滚
    queries:
      - tmux copy mode
      - tmux scroll history
      - tmux 查看历史输出
  shortcuts:
    - keys: prefix + [
      description: Enter copy mode
      i18n:
        zh:
          description: 进入 copy mode
  commands:
    - command: tmux copy-mode
      description: Enter copy mode in the current pane
      i18n:
        zh:
          description: 在当前 pane 进入 copy mode
      pasteable: true
      risk: safe
    - command: tmux copy-mode -u
      description: Enter copy mode and scroll one page up
      i18n:
        zh:
          description: 进入 copy mode 并向上翻一页
      pasteable: true
      risk: safe
- id: tmux.copy-mode.cancel
  tool: tmux
  category: copy-mode
  title: Exit copy mode
  zh: 退出 tmux copy mode
  intent:
    verbs:
      - exit
      - quit
      - cancel
      - leave
      - 退出
      - 取消
    objects:
      - copy-mode
      - copy mode
      - 复制模式
    queries:
      - tmux exit copy mode
      - 退出 tmux copy mode
  shortcuts:
    - keys: q
      description: Quit copy mode while already inside copy mode
      i18n:
        zh:
          description: 在 copy mode 中按 q 退出
    - keys: Esc
      description: Cancel in vi-style copy mode
      i18n:
        zh:
          description: 在 vi 风格 copy mode 中按 Esc 取消
  commands:
    - command: tmux send-keys -X cancel
      description: Cancel copy mode by sending a copy-mode command
      i18n:
        zh:
          description: 发送取消命令退出 copy mode
      pasteable: true
      risk: safe
- id: tmux.copy-mode.copy
  tool: tmux
  category: copy-mode
  title: Copy selection
  zh: 在 copy mode 中复制选中内容
  intent:
    verbs:
      - copy
      - yank
      - 复制
    objects:
      - copy-mode
      - selection
      - 选中
      - 复制模式
    queries:
      - tmux copy selection
      - tmux copy mode 复制
      - tmux 复制选中内容
  shortcuts:
    - keys: Enter
      description: Copy the selection and exit copy mode
      i18n:
        zh:
          description: 复制选中文本并退出 copy mode
    - keys: Space
      description: Start selection in vi mode
      i18n:
        zh:
          description: 在 vi 模式下开始选择文本
  commands:
    - command: tmux send-keys -X copy-selection
      description: Copy the current selection
      i18n:
        zh:
          description: 复制当前选中的内容
      pasteable: true
      risk: safe
    - command: tmux send-keys -X copy-selection-and-cancel
      description: Copy the selection and exit copy mode
      i18n:
        zh:
          description: 复制选中内容并退出 copy mode
      pasteable: true
      risk: safe

- id: tmux.copy-mode.search
  tool: tmux
  category: copy-mode
  title: Search in copy mode
  zh: 在 copy mode 中搜索
  intent:
    verbs:
      - search
      - find
      - 搜索
      - 查找
    objects:
      - copy-mode
      - 复制模式
    queries:
      - tmux copy mode search
      - tmux copy mode 搜索
      - tmux 查找内容
  shortcuts:
    - keys: /
      description: Search forward (vi-style)
      i18n:
        zh:
          description: 向前搜索（vi 风格）
    - keys: "?"
      description: Search backward (vi-style)
      i18n:
        zh:
          description: 向后搜索（vi 风格）
    - keys: n
      description: Repeat last search in the same direction
      i18n:
        zh:
          description: 沿同一方向重复上次搜索
    - keys: N
      description: Repeat last search in the opposite direction
      i18n:
        zh:
          description: 沿相反方向重复上次搜索
  commands:
    - command: tmux send-keys -X search-forward
      description: Enter forward search
      i18n:
        zh:
          description: 进入向前搜索
      pasteable: true
      risk: safe
    - command: tmux send-keys -X search-backward
      description: Enter backward search
      i18n:
        zh:
          description: 进入向后搜索
      pasteable: true
      risk: safe
