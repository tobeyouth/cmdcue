- id: tmux.window.close-current
  tool: tmux
  category: window
  title: Close current window
  zh: 关闭当前 tmux window
  intent:
    verbs:
      - close
      - kill
      - delete
      - remove
      - 关掉
      - 关闭
      - 删除
    objects:
      - window
      - 窗口
    queries:
      - tmux close window
      - tmux 关掉 window
      - 关闭当前 tmux 窗口
  shortcuts:
    - keys: prefix + &
      description: Prompt before killing the current window
      i18n:
        zh:
          description: 关闭当前 window 前会弹出确认提示
  commands:
    - command: tmux kill-window
      preferredCommand: tmux killw
      description: Kill the current tmux window
      i18n:
        zh:
          description: 关闭当前 tmux window
      pasteable: true
      risk: destructive
  notes:
    - This closes every pane inside the current window.
- id: tmux.window.list
  tool: tmux
  category: window
  title: List windows
  zh: 列出 tmux windows
  intent:
    verbs:
      - list
      - show
      - view
      - 查看
      - 列出
    objects:
      - window
      - windows
      - 窗口
    queries:
      - tmux list windows
      - tmux window
      - 列出 tmux window
  shortcuts:
    - keys: prefix + w
      description: Open the interactive window tree
      i18n:
        zh:
          description: 打开交互式 window 树状图
  commands:
    - command: tmux list-windows
      preferredCommand: tmux lsw
      description: List windows in the current session
      i18n:
        zh:
          description: 列出当前 session 中的 windows
      pasteable: true
      risk: readonly
    - command: tmux list-windows -a
      preferredCommand: tmux lsw -a
      description: List windows from all sessions
      i18n:
        zh:
          description: 列出所有 sessions 中的 windows
      pasteable: true
      risk: readonly
- id: tmux.window.new
  tool: tmux
  category: window
  title: Create a new window
  zh: 创建新的 tmux window
  i18n:
    zh:
      title: 创建新的 tmux window
  intent:
    verbs:
      - new
      - create
      - open
      - 新建
      - 创建
    objects:
      - window
      - 窗口
    queries:
      - tmux new window
      - tmux 新建 window
  shortcuts:
    - keys: prefix + c
      description: Create a new window interactively
      i18n:
        zh:
          description: 交互式创建新的 window
  commands:
    - command: tmux new-window
