- id: tmux.window.select
  tool: tmux
  category: window
  title: Select a window by index
  zh: 按编号切换 tmux window
  intent:
    verbs:
      - select
      - switch
      - go
      - 切换
      - 选择
    objects:
      - window
      - index
      - 窗口
      - 编号
    queries:
      - tmux select window
      - tmux switch window by index
  shortcuts:
    - keys: prefix + 0..9
      description: Select a window by number
      i18n:
        zh:
          description: 按编号选择 window
  commands:
    - command: tmux select-window -t <window-index>
      preferredCommand: tmux selectw -t <window-index>
      description: Select a window by target or index
      i18n:
        zh:
          description: 按目标或编号选择 window
      pasteable: true
      risk: safe
