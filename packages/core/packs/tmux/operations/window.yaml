- id: tmux.window.new-named
  tool: tmux
  category: window
  title: Create a named window
  zh: 创建命名 tmux window
  intent:
    verbs:
      - new
      - create
      - open
      - name
      - 新建
      - 创建
      - 命名
    objects:
      - window
      - 窗口
    queries:
      - tmux new named window
      - tmux 创建命名 window
  shortcuts:
    - keys: prefix + c
      description: Create a new window, then rename if needed
      i18n:
        zh:
          description: 创建新 window，如有需要再重命名
  commands:
    - command: tmux new-window -n <window-name>
      preferredCommand: tmux neww -n <window-name>
      description: Create a new window with a name
      i18n:
        zh:
          description: 创建一个带名称的新 window
      pasteable: true
      risk: safe
  notes:
    - Replace <window-name> before running.
